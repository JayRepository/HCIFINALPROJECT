<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Team | 3D GSAP Carousel</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
    <figure class="logo">
      <img src="images/starbucks.png" alt="Starbucks Logo">
    </figure>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>  
  </header>

  <h1 class="team-about-title">OUR TEAM</h1>

  <div class="team-carousel-container">
    <!-- Left Arrow -->
    <button class="team-nav-arrow left">‹</button>

    <!-- Track -->
    <div class="team-carousel-track">
      <div class="team-card"><img src="images/Jayson.jpg" alt="Jayson Pardo" draggable="false"></div>
      <div class="team-card"><img src="images/AKO_NI1.jpg" alt="Ade Lozada" draggable="false"></div>
      <div class="team-card"><img src="images/Kyle.jpg" alt="Kyle Gimena" draggable="false"></div>
    </div>

    <!-- Right Arrow -->
    <button class="team-nav-arrow right">›</button>
  </div>

  <div class="team-member-info">
    <h2 class="team-member-name">Jayson Pardo</h2>
    <p class="team-member-role">Designer</p>
  </div>

  <div class="team-dots">
    <div class="team-dot active"></div>
    <div class="team-dot"></div>
    <div class="team-dot"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
